name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]

jobs:
  build-backend:
    name: 🔧 Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build image
        run: docker build -t tp-backend ./backend

  build-frontend:
    name: 🎨 Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build image
        run: docker build -t tp-frontend ./frontend

  terraform:
    name: 🏗️ Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Init
        run: terraform init
        working-directory: ./terraform
      - name: Validate
        run: terraform validate
        working-directory: ./terraform
