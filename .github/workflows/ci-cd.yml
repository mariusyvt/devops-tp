name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────
  # Job 1 : Tests backend
  # ─────────────────────────────────────────
  test-backend:
    name: 🧪 Tests Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: taskdb_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install & test
        working-directory: ./backend
        run: |
          npm ci
          npm test
        env:
          DB_HOST: localhost
          DB_NAME: taskdb_test
          DB_USER: postgres
          DB_PASSWORD: password

  # ─────────────────────────────────────────
  # Job 2 : Build frontend
  # ─────────────────────────────────────────
  test-frontend:
    name: 🎨 Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install & build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

  # ─────────────────────────────────────────
  # Job 3 : Build Docker images
  # (tourne seulement si les tests passent)
  # ─────────────────────────────────────────
  build-docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v3

      - name: Build backend
        run: docker build -t tp-backend ./backend

      - name: Build frontend
        run: docker build -t tp-frontend ./frontend

      - name: Smoke test backend
        run: |
          docker network create tp_net
          docker run -d --name postgres --network tp_net \
            -e POSTGRES_DB=taskdb \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=password \
            postgres:15-alpine
          sleep 5
          docker run -d --name backend --network tp_net \
            -e DB_HOST=postgres \
            -e DB_NAME=taskdb \
            -e DB_USER=postgres \
            -e DB_PASSWORD=password \
            -p 3001:3001 \
            tp-backend
          sleep 3
          curl --fail http://localhost:3001/health
          echo "✅ Backend répond correctement"
